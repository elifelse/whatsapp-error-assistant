version: "3.9"

services:
  whatsapp-error-assistant:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-error-assistant
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      # CLAUDE_API_KEY değerini .env dosyasından veya ortam değişkeninden alır
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.whatsapp-error-assistant.description=WhatsApp Error Assistant API"
      - "com.whatsapp-error-assistant.version=1.0.0"
